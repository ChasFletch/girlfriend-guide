name: Generate Girlfriend Guide

on:
  # Manual trigger — still works for any game
  workflow_dispatch:
    inputs:
      team:
        description: "Team slug (e.g. houston-dynamo)"
        required: true
        default: "houston-dynamo"
      opponent:
        description: "Opponent team name"
        required: true
      date:
        description: "Match date (YYYY-MM-DD)"
        required: true
      theme:
        description: "Match theme (e.g. Rodeo Night)"
        required: false
        default: ""

  # Automated — runs Friday afternoon to pick up Perplexity Computer's research and prep for Saturday games
  schedule:
    - cron: '0 22 * * 5'  # Fridays at 5pm CT (after PC commits research-data.json at 8am PT)

jobs:
  # Step 1: Check all Texas teams for upcoming home games (scheduled runs only)
  check-schedule:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      matrix: ${{ steps.schedule.outputs.matrix }}
      has_games: ${{ steps.schedule.outputs.has_games }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Check next home game for each Texas team
        id: schedule
        run: |
          cd pipeline
          MATRIX='{"include":['
          HAS_GAMES=false

          for TEAM in houston-dynamo fc-dallas austin-fc; do
            # Capture schedule output
            OUTPUT=$(python -c "
          import asyncio, json
          from schedule import fetch_schedule, get_next_home_game
          matches = asyncio.run(fetch_schedule('$TEAM'))
          game = get_next_home_game('$TEAM', matches)
          if game:
              print(json.dumps({'team': '$TEAM', 'opponent': game['opponent'], 'date': game['date']}))
          " 2>/dev/null || true)

            if [ -n "$OUTPUT" ]; then
              if [ "$HAS_GAMES" = true ]; then
                MATRIX="$MATRIX,"
              fi
              MATRIX="$MATRIX$OUTPUT"
              HAS_GAMES=true
            fi
          done

          MATRIX="$MATRIX]}"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "has_games=$HAS_GAMES" >> $GITHUB_OUTPUT

  # Step 2: Generate guides (home games only, or manual trigger)
  generate:
    runs-on: ubuntu-latest
    needs: [check-schedule]
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'schedule' && needs.check-schedule.outputs.has_games == 'true')
      )
    strategy:
      matrix: ${{ github.event_name == 'schedule' && fromJson(needs.check-schedule.outputs.matrix) || fromJson('{"include":[{"team":"placeholder"}]}') }}
      fail-fast: false
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Set match variables
        id: match
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "team=${{ github.event.inputs.team }}" >> $GITHUB_OUTPUT
            echo "opponent=${{ github.event.inputs.opponent }}" >> $GITHUB_OUTPUT
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
            echo "theme=${{ github.event.inputs.theme }}" >> $GITHUB_OUTPUT
          else
            echo "team=${{ matrix.team }}" >> $GITHUB_OUTPUT
            echo "opponent=${{ matrix.opponent }}" >> $GITHUB_OUTPUT
            echo "date=${{ matrix.date }}" >> $GITHUB_OUTPUT
            echo "theme=" >> $GITHUB_OUTPUT
          fi

      - name: Generate guide
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd pipeline
          python generate.py \
            --team "${{ steps.match.outputs.team }}" \
            --opponent "${{ steps.match.outputs.opponent }}" \
            --date "${{ steps.match.outputs.date }}" \
            --theme "${{ steps.match.outputs.theme }}"

      - name: Commit and push generated guide
        run: |
          git config user.name "Girlfriend Guide Bot"
          git config user.email "bot@girlfriendguide.gg"
          git add -A
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Generate guide: ${{ steps.match.outputs.team }} vs ${{ steps.match.outputs.opponent }} (${{ steps.match.outputs.date }})"
          git push
